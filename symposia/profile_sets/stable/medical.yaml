version: v1
id: medical_strict_v1
domain: medical
purpose: Conservative medical validation with domain-specialist harm gate.
domain_guidance: >
  Domain focus: medical or health-related claims.
  Prioritize safety, clinical caution, contraindications, and whether the
  statement overstates efficacy or safety.
profiles:
  - risk_sentinel_v1
  - evidence_maximalist_v1
  - medical_specialist_v1
  - sceptical_verifier_v1
  - literal_parser_v1
thresholds:
  support: 0.80
  confidence: 0.82
max_rounds: 2
issuance_policy: conservative
trace_level: elevated
calibration_snapshot: medical_2026_q1
defaults:
  domain_default: true
  registry_group: stable
notes: Stable medical strict policy set.
