version: v1
route_set_id: committee_round0_mixed_small_triplet_v1
stage: round0
domain: all
output_schema: juror_decision_v1
guardrails:
  max_premium_jurors_per_run: 0
  require_provider_diversity: true
  require_model_family_diversity: true
  premium_allowed_in_round0: false
assignments:
  - slot_id: round0_mixed_small_balanced_openai_1
    profile_id: balanced_reviewer_v1
    provider: openai
    model: gpt-5.4-nano
    model_family: gpt-5.4
    tier: small_capable
    timeout_seconds: 12
    max_output_tokens: 600
    fallback:
      provider: anthropic
      model: claude-3-haiku-20240307
      model_family: claude-3

  - slot_id: round0_mixed_small_sceptical_claude_1
    profile_id: sceptical_verifier_v1
    provider: anthropic
    model: claude-3-haiku-20240307
    model_family: claude-3
    tier: small_capable
    timeout_seconds: 12
    max_output_tokens: 600
    fallback:
      provider: google
      model: gemini-2.5-flash-lite
      model_family: gemini-2-5

  - slot_id: round0_mixed_small_evidence_gemini_1
    profile_id: evidence_maximalist_v1
    provider: google
    model: gemini-2.5-flash-lite
    model_family: gemini-2-5
    tier: small_capable
    timeout_seconds: 12
    max_output_tokens: 700
    fallback:
      provider: openai
      model: gpt-5.4-nano
      model_family: gpt-5.4
notes: Mixed-provider small-model triplet route for isolating cross-family diversity effect.