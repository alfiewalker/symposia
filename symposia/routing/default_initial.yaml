version: v1
route_set_id: default_initial
stage: initial
domain: all
output_schema: juror_decision_v1
guardrails:
  max_premium_jurors_per_run: 0
  require_provider_diversity: true
  require_model_family_diversity: true
  premium_allowed_in_initial: false
assignments:
  - slot_id: initial_balanced_1
    profile_id: balanced_reviewer_v1
    provider: openai
    model: gpt-4o-mini
    model_family: gpt-4o
    tier: small_capable
    timeout_seconds: 12
    max_output_tokens: 600
    fallback:
      provider: anthropic
      model: claude-3-haiku-20240307
      model_family: claude-3

  - slot_id: initial_sceptical_1
    profile_id: sceptical_verifier_v1
    provider: anthropic
    model: claude-3-haiku-20240307
    model_family: claude-3
    tier: small_capable
    timeout_seconds: 12
    max_output_tokens: 600
    fallback:
      provider: google
      model: gemini-2.5-flash-lite
      model_family: gemini-2-5

  - slot_id: initial_literal_1
    profile_id: literal_parser_v1
    provider: google
    model: gemini-2.5-flash-lite
    model_family: gemini-2-5
    tier: small_capable
    timeout_seconds: 12
    max_output_tokens: 600
    fallback:
      provider: openai
      model: gpt-4o-mini
      model_family: gpt-4o

  - slot_id: initial_evidence_1
    profile_id: evidence_maximalist_v1
    provider: openai
    model: gpt-4o-mini
    model_family: gpt-4o
    tier: small_capable
    timeout_seconds: 12
    max_output_tokens: 700
    fallback:
      provider: google
      model: gemini-2.5-flash-lite
      model_family: gemini-2-5

  - slot_id: initial_risk_1
    profile_id: risk_sentinel_v1
    provider: anthropic
    model: claude-3-haiku-20240307
    model_family: claude-3
    tier: small_capable
    timeout_seconds: 12
    max_output_tokens: 700
    fallback:
      provider: openai
      model: gpt-4o-mini
      model_family: gpt-4o
notes: Default initial routing uses only small-capable models with provider diversity.
