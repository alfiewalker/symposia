    max_output_tokens: 600
    fallback:
      provider: openai
      model: gpt-5.4-mini
      model_family: gpt-5.4

  - slot_id: round0_openai_evidence_1
    profile_id: evidence_maximalist_v1
    provider: openai
    model: gpt-5.4-mini
    model_family: gpt-5.4
    tier: small_capable
