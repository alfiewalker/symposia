version: openai_total_token_price_v1_2026_03_21
token_accounting: total_tokens_only
unit: usd_per_million_total_tokens_estimate
assumption: conservative_output_rate
notes: |
  Estimated cost uses observed total tokens from runtime and multiplies by the
  configured per-model total-token rate. This is an estimate, not billed cost.
