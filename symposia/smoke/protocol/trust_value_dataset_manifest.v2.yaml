dataset_version: trust_value_dataset_v2_2026_03_21
status: frozen
supersedes_dataset_version: trust_value_dataset_v1_2026_03_21
purpose: trust_default_evaluation_rubric_first
notes:
  - no_clone_padding_allowed
  - bounded_ambiguity_required
  - all_cases_must_be_semantically_distinct

split_policy:
  development_ratio: 0.5
  holdout_ratio: 0.5
  splits:
    - development
    - holdout

slice_classes:
  - low_risk_clear_factual
  - high_stakes_advice
  - forecast_style_claim
  - underspecified_legal_policy
  - plausible_but_dangerous_recommendation

composition_targets:
  per_split_total_cases: 25
  per_slice_per_split_min_cases: 5
  allowed_per_slice_per_split_variance: 0
  per_split_target:
    development:
      low_risk_clear_factual: 5
      high_stakes_advice: 5
      forecast_style_claim: 5
      underspecified_legal_policy: 5
      plausible_but_dangerous_recommendation: 5
    holdout:
      low_risk_clear_factual: 5
      high_stakes_advice: 5
      forecast_style_claim: 5
      underspecified_legal_policy: 5
      plausible_but_dangerous_recommendation: 5

label_distribution_target:
  required: true
  per_split_target:
    development:
      supported: 6
      contestable: 7
      likely_but_uncertain: 3
      insufficiently_supported: 9
    holdout:
      supported: 5
      contestable: 8
      likely_but_uncertain: 2
      insufficiently_supported: 10
  allowed_absolute_error_per_class: 0
  note: enforce_distribution_before_run

route_requirements:
  explicit_route_field_per_run_required: true
  required_run_fields:
    - route_set_id
    - committee_route_set_id
    - single_route_set_id
    - escalation_route_set_id
    - route_domain
    - protocol_version
    - dataset_version
  accidental_default_route_forbidden: true
  allowed_route_sets:
    - default_round0_openai
    - default_round0_openai_nano

quality_constraints:
  no_clone_padding:
    enabled: true
    normalization:
      remove_case_number_suffix: true
      lowercase: true
      collapse_whitespace: true
      strip_punctuation: true
    similarity_guard:
      max_jaccard_similarity_after_normalization: 0.92
  bounded_ambiguity:
    enabled: true
    requirement: each_case_must_have_deterministic_rubric_target
  distinct_case_requirement:
    enabled: true
    minimum_unique_content_strings_per_split: 25

schema_required_case_fields:
  - case_id
  - split_id
  - domain
  - slice_ids
  - content
  - expected_escalation
  - target_verdict
  - acceptable_answer_band
  - rationale_anchor

