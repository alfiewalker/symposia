# Symposia Local Development Configuration File
# This file is for local development and testing purposes.

# 1. LLM Service Definitions
# Using OpenAI GPT-4o-mini with different roles/personalities
llm_services:
  openai_skeptic:
    provider: openai
    model: gpt-4o-mini
    cost_per_token:
      input: 0.00000015
      output: 0.0000006
  openai_optimist:
    provider: openai
    model: gpt-4o-mini
    cost_per_token:
      input: 0.00000015
      output: 0.0000006
  openai_pragmatist:
    provider: openai
    model: gpt-4o-mini
    cost_per_token:
      input: 0.00000015
      output: 0.0000006
  claude_expert:
    provider: anthropic
    model: claude-3-opus-20240229
    cost_per_token:
      input: 0.000003
      output: 0.000015

# 2. Intelligence Pool Definitions
intelligence_pools:
  clone_committee:
    name: "Multi-Personality Test Committee"
    
    # --- Reputation Management Settings ---
    reputation_management: true 
    agreement_bonus: 0.1
    dissent_penalty: 0.05

    # --- Member Definitions ---
    members:
      - name: "Skeptical Scientist"
        service: "openai_skeptic"
        weight: 1.0
        initial_reputation: 1.0
        role_prompt: "You are a skeptical scientist. Always question assumptions, demand evidence, and look for potential flaws in arguments. You prefer conservative conclusions and require rigorous proof before accepting claims."

      - name: "Optimistic Innovator"
        service: "openai_optimist"
        weight: 1.0
        initial_reputation: 1.0
        role_prompt: "You are an optimistic innovator. Focus on possibilities, opportunities, and positive outcomes. You believe in human potential and technological progress. Look for creative solutions and silver linings."

      - name: "Pragmatic Realist"
        service: "openai_pragmatist"
        weight: 1.0
        initial_reputation: 1.0
        role_prompt: "You are a pragmatic realist. Focus on practical considerations, real-world constraints, and balanced perspectives. Consider costs, benefits, and feasibility. Provide grounded, actionable insights."

  mixed_committee:
    name: "Mixed Provider Committee"
    
    # --- Reputation Management Settings ---
    reputation_management: true 
    agreement_bonus: 0.1
    dissent_penalty: 0.05

    # --- Member Definitions ---
    members:
      - name: "OpenAI Analyst"
        service: "openai_skeptic"
        weight: 1.2
        initial_reputation: 1.0
        role_prompt: "You are an analytical thinker focused on data and evidence. Evaluate claims methodically and carefully, considering statistical significance and scientific validity. Provide detailed reasoning for your assessments."
      
      - name: "Claude Expert"
        service: "claude_expert"
        weight: 1.0
        initial_reputation: 1.0
        role_prompt: "You are a thoughtful expert with deep domain knowledge across multiple fields. Take your time to reason step-by-step through complex problems. Consider ethical implications and nuances in your analysis."
      
      - name: "OpenAI Synthesizer" 
        service: "openai_optimist"
        weight: 1.0
        initial_reputation: 1.0
        role_prompt: "You are a synthesizing thinker who connects ideas across domains. Look for patterns and relationships between concepts. Distill complex topics into clear insights while maintaining accuracy and nuance."

  