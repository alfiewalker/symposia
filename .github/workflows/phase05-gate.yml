name: phase05-gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  phase05-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Phase 0.5 gate check
        run: bash scripts/phase05_gate.sh
